<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Ecommerce Store</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- =========================
       NAVBAR
  ========================== -->

  <nav class="navbar">

    <h1>MyShop</h1>

    <h2>Welcome to My Store</h2>

    <!-- DARK MODE -->

    <button id="darkModeBtn">
      Dark Mode
    </button>

    <!-- SEARCH -->

    <input
      type="text"
      id="searchInput"
      placeholder="Search products..."
    />

    <!-- CART -->

    <div class="cart">

      Cart:
      <span id="cartCount">
        0
      </span>

    </div>

    <!-- CART PAGE -->

    <a href="cart.html">
      Go To Cart
    </a>

  </nav>

  <!-- =========================
       SORT
  ========================== -->

  <div class="sort-container">

    <select id="sort">

      <option value="default">
        Sort Products
      </option>

      <option value="low">
        Price: Low To High
      </option>

      <option value="high">
        Price: High To Low
      </option>

    </select>

  </div>

  <!-- =========================
       LOADER
  ========================== -->

  <div id="loader">
    Loading...
  </div>

  <!-- =========================
       FILTER BUTTONS
  ========================== -->

  <div class="filters">

    <button onclick="filterProducts('All')">
      All
    </button>

    <button onclick="filterProducts('Fashion')">
      Fashion
    </button>

    <button onclick="filterProducts('Electronics')">
      Electronics
    </button>

  </div>

  <!-- =========================
       PRODUCTS CONTAINER
  ========================== -->

  <div
    class="products-container"
    id="productsContainer"
  >

    <!-- PRODUCTS FROM JS -->

  </div>

  <!-- =========================
       PRODUCT MODAL
  ========================== -->

  <div
    class="modal"
    id="modal"
  >

    <div class="modal-content">

      <!-- CLOSE BUTTON -->

      <span id="closeModal">

        &times;

      </span>

      <!-- PRODUCT IMAGE -->

      <img
        id="modalImage"
        alt="Product Image"
      />

      <!-- PRODUCT TITLE -->

      <h2 id="modalTitle"></h2>

      <!-- PRODUCT PRICE -->

      <p id="modalPrice"></p>

      <!-- PRODUCT DESCRIPTION -->

      <p id="modalDescription"></p>

    </div>

  </div>

  <!-- =========================
       TOAST MESSAGE
  ========================== -->

  <div id="toast">

    Product Added To Cart

  </div>

  <!-- =========================
       JAVASCRIPT
  ========================== -->

  <script src="script.js"></script>

</body>

</html>
